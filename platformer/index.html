<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Google tag (gtag.js) — same property as the main site so this
         standalone game page reports under its own /platformer/ path. -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-YL2TN1H62K"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-YL2TN1H62K");
    </script>
    <link rel="icon" type="image/svg+xml" href="../vite.svg" />
    <!-- Game page: block pinch-zoom so touch controls behave. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Platformer</title>
    <style>
      /* Standalone shell: dark backdrop, game centered. The component
         brings all of its own styling via platformer.css. */
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #1a1c24;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        box-sizing: border-box;
      }
      /* Fit-to-screen: cap the 16:9 stage (and the control bar under
         it) so canvas + touch controls fit the viewport height with no
         scrolling — same math as the component's :fullscreen rule.
         ~150px covers page/shell padding plus the control bar. dvh
         tracks the real visible height around mobile browser bars. */
      #root .plat-stage,
      #root .plat-touch-bar {
        width: min(100%, calc((100vh - 150px) * 16 / 9));
        width: min(100%, calc((100dvh - 150px) * 16 / 9));
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
