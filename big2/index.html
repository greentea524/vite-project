<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../vite.svg" />
    <!-- Game page: block pinch-zoom so touch controls behave. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Big 2</title>
    <style>
      /* Standalone shell: card-table felt backdrop, game centered.
         The component brings its own styling via big2.css. */
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #14532d;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 12px;
        box-sizing: border-box;
      }
      /* Keep the table from stretching absurdly wide on desktop. */
      #root > * {
        max-width: 1000px;
      }
      /* Short landscape phones: give the table the shell padding back. */
      @media (max-height: 520px) and (orientation: landscape) {
        #root {
          padding: 2px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
