<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Terminal Feed</title>
<!--
  Standalone fake "hacker" terminal feed for screen-recording / demos.
  Open directly in a browser, or reach it from the app under
  Utility → Hacker Terminal.

  Controls: tap the ⚙ gear (bottom-right) for the settings panel —
  pause/resume, speed, fullscreen, and theme.
  Shortcuts: Space = pause/resume, f = fullscreen, ↑/↓ = speed, Esc = close.

  Themes:
    • Classic — green-on-black log feed (default).
    • Binary  — same feed rendered as a matrix of 0s and 1s.
  Pick a theme from the settings panel; Classic is the default and is
  unchanged unless Binary is selected.
-->

<style>
  :root {
    --green: #33ff66;
    --green-dim: #1c8a39;
    --amber: #ffcc33;
    --red: #ff4d4d;
    --bg: #000500;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  body {
    font-family: "Cascadia Code", "Fira Code", "Consolas", "Courier New", monospace;
    color: var(--green);
    display: flex;
    flex-direction: column;
    height: 100vh;
    text-shadow: 0 0 4px rgba(51, 255, 102, 0.55);
  }

  /* faint CRT scanline overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 0, 0, 0.25) 3px,
      rgba(0, 0, 0, 0) 4px
    );
    z-index: 5;
  }

  #feed {
    flex: 1;
    overflow: hidden;
    padding: 16px 20px 8px;
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .line { display: block; }
  .dim   { color: var(--green-dim); }
  .amber { color: var(--amber); text-shadow: 0 0 4px rgba(255, 204, 51, 0.55); }
  .red   { color: var(--red);   text-shadow: 0 0 5px rgba(255, 77, 77, 0.6); }
  .granted { color: var(--green); font-weight: bold; }
  .bar { color: var(--green-dim); }

  /* blinking cursor on the last line */
  #cursor {
    display: inline-block;
    width: 9px;
    height: 16px;
    background: var(--green);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* floating settings (gear) button — always reachable, incl. on touch */
  #gearBtn {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 20;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(0, 20, 6, 0.85);
    color: var(--green);
    border: 1px solid var(--green-dim);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 10px rgba(51, 255, 102, 0.25);
    transition: opacity 0.4s ease, background 0.15s, transform 0.2s ease;
  }
  #gearBtn:hover { background: var(--green-dim); color: #000; }
  body.settings-open #gearBtn { transform: rotate(60deg); }
  /* dim (but never fully hide) the gear when idle, so it stays discoverable
     on touch while keeping recordings clean; tap/move restores it */
  body.idle:not(.settings-open) #gearBtn { opacity: 0.25; }

  /* settings panel — hidden until the gear is tapped */
  #controls {
    position: fixed;
    right: 16px;
    bottom: 76px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 260px;
    max-width: calc(100vw - 32px);
    padding: 14px 16px;
    background: rgba(0, 20, 6, 0.95);
    border: 1px solid var(--green-dim);
    border-radius: 8px;
    box-shadow: 0 0 16px rgba(0, 0, 0, 0.6);
    font-size: 14px;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  body.settings-open #controls {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .controls-title {
    font-weight: bold;
    color: var(--green);
    border-bottom: 1px solid var(--green-dim);
    padding-bottom: 8px;
  }

  #controls button {
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green-dim);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
    flex: 1;
    transition: background 0.15s, color 0.15s;
  }
  #controls button:hover { background: var(--green-dim); color: #000; }
  #controls label { color: var(--green-dim); }
  #speedVal { color: var(--green); min-width: 38px; display: inline-block; text-align: right; }
  #controls input[type="range"] { accent-color: var(--green); cursor: pointer; flex: 1; min-width: 0; }
  #status { color: var(--green-dim); }

  .theme-btn.theme-active { background: var(--green-dim); color: #000; }

  /* Binary matrix theme: uniform green, wide letter spacing, and the feed
     text is rendered as 0s/1s (see toBinary in the script). */
  body.theme-matrix { text-shadow: 0 0 6px rgba(51, 255, 102, 0.7); }
  body.theme-matrix #feed {
    letter-spacing: 2px;
    word-break: break-all;
  }
  body.theme-matrix .dim,
  body.theme-matrix .bar,
  body.theme-matrix .amber,
  body.theme-matrix .red {
    color: var(--green);
    text-shadow: inherit;
  }
  body.theme-matrix .granted { color: #eafff0; }
</style>
</head>
<body>
  <div id="feed" aria-live="off"></div>

  <button id="gearBtn" type="button" aria-label="Settings" aria-expanded="false" title="Settings">⚙</button>

  <div id="controls" role="dialog" aria-label="Terminal settings" aria-hidden="true">
    <div class="controls-row controls-title">Settings</div>
    <div class="controls-row">
      <button id="toggleBtn" type="button" title="Pause / resume (space)">⏸ Pause</button>
      <button id="fsBtn" type="button" title="Toggle fullscreen (f)">⛶ Fullscreen</button>
    </div>
    <div class="controls-row">
      <label for="speed">speed</label>
      <input id="speed" type="range" min="1" max="20" value="10" />
      <span id="speedVal">1.0x</span>
    </div>
    <div class="controls-row theme-row">
      <label>theme</label>
      <button id="themeClassic" class="theme-btn theme-active" type="button">Classic</button>
      <button id="themeMatrix" class="theme-btn" type="button">Binary</button>
    </div>
    <div class="controls-row">
      <span id="status">streaming</span>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var feed = document.getElementById("feed");
  var toggleBtn = document.getElementById("toggleBtn");
  var speedInput = document.getElementById("speed");
  var speedVal = document.getElementById("speedVal");
  var statusEl = document.getElementById("status");
  var fsBtn = document.getElementById("fsBtn");
  var gearBtn = document.getElementById("gearBtn");
  var controls = document.getElementById("controls");
  var themeClassicBtn = document.getElementById("themeClassic");
  var themeMatrixBtn = document.getElementById("themeMatrix");

  var MAX_LINES = 200;     // cap DOM nodes so it can loop forever
  var BASE_DELAY = 320;    // ms per line at 1.0x
  var paused = false;
  var timer = null;
  var theme = "classic";   // "classic" (green text) or "matrix" (0s/1s)

  // ----- helpers -----------------------------------------------------------
  function rand(n) { return Math.floor(Math.random() * n); }
  function pick(arr) { return arr[rand(arr.length)]; }
  function pad(n, len) { n = String(n); while (n.length < len) n = "0" + n; return n; }

  function hex(len) {
    var s = "";
    for (var i = 0; i < len; i++) s += "0123456789abcdef"[rand(16)];
    return s;
  }

  function ip() {
    return rand(256) + "." + rand(256) + "." + rand(256) + "." + rand(256);
  }

  function ts() {
    var d = new Date();
    return pad(d.getHours(), 2) + ":" + pad(d.getMinutes(), 2) + ":" +
           pad(d.getSeconds(), 2) + "." + pad(d.getMilliseconds(), 3);
  }

  // ----- line generators ---------------------------------------------------
  var HOSTS = ["node", "core", "relay", "vault", "gw", "edge", "proxy", "shard"];
  var USERS = ["root", "admin", "svc_db", "operator", "deploy", "guest", "sysop"];
  var SERVICES = ["sshd", "kernel", "nginx", "auth", "ftpd", "dns", "ids", "vpn"];
  var PROTOS = ["TCP", "UDP", "TLS1.3", "SSH2", "HTTP/2", "ICMP"];
  var FILES = [
    "/etc/shadow", "/var/lib/secrets.db", "/boot/vmlinuz", "/root/.ssh/id_rsa",
    "/opt/payload.bin", "/proc/kcore", "/dev/mem", "/usr/bin/portscan"
  ];

  function hexDump() {
    var addr = "0x" + hex(8).toUpperCase();
    var bytes = "";
    for (var i = 0; i < 16; i++) bytes += hex(2) + " ";
    var ascii = "";
    for (var j = 0; j < 16; j++) {
      var c = 33 + rand(94);
      ascii += (c >= 33 && c <= 126) ? String.fromCharCode(c) : ".";
    }
    return { cls: "dim", html: addr + "  " + bytes + " |" + ascii + "|" };
  }

  function progressBar() {
    var pct = rand(101);
    var width = 28;
    var filled = Math.round(pct / 100 * width);
    var bar = "";
    for (var i = 0; i < width; i++) bar += i < filled ? "█" : "░";
    var label = pick([
      "decrypting", "exfiltrating", "bruteforce", "uploading", "mapping subnet",
      "cracking hash", "injecting", "scanning ports", "tunneling"
    ]);
    return { cls: "bar", html: "[" + bar + "] " + pad(pct, 3) + "%  " + label };
  }

  function access() {
    var granted = Math.random() > 0.45;
    if (granted) {
      return {
        cls: "granted",
        html: "[" + ip() + "] " + pick(USERS) + "@" + pick(HOSTS) +
              "  >>> ACCESS GRANTED  (token " + hex(12) + ")"
      };
    }
    return {
      cls: "red",
      html: "[" + ip() + "] " + pick(USERS) + "@" + pick(HOSTS) +
            "  !!! ACCESS DENIED  (retry " + (1 + rand(9)) + "/9)"
    };
  }

  function netLine() {
    return {
      cls: "",
      html: ip() + ":" + (1024 + rand(64000)) + " -> " + ip() + ":" + pick([22, 80, 443, 3306, 8080]) +
            "  " + pick(PROTOS) + "  " + pick(["SYN", "ACK", "ESTABLISHED", "FIN", "RST"]) +
            "  " + (rand(9000) + 40) + "b"
    };
  }

  function sysLine() {
    return {
      cls: "dim",
      html: pick(SERVICES) + "[" + (100 + rand(9000)) + "]: " + pick([
        "session opened for user " + pick(USERS),
        "connection from " + ip() + " port " + (1024 + rand(64000)),
        "reading " + pick(FILES),
        "key exchange complete, cipher aes256-gcm",
        "firewall rule bypassed on chain INPUT",
        "spawning shell pid=" + (1000 + rand(60000)),
        "memory region " + "0x" + hex(8) + " mapped rwx",
        "checksum " + hex(40)
      ])
    };
  }

  function alertLine() {
    return {
      cls: "amber",
      html: "[WARN] " + pick([
        "intrusion detection triggered on " + pick(HOSTS),
        "anomalous traffic from " + ip(),
        "privilege escalation attempt detected",
        "tracing route... " + Array.from({ length: 4 }, ip).join(" -> "),
        "encryption layer " + (1 + rand(7)) + " peeled"
      ])
    };
  }

  // weighted generator pool
  var GENERATORS = [
    hexDump, hexDump, sysLine, sysLine, netLine, netLine, netLine,
    progressBar, progressBar, access, access, alertLine
  ];

  // Encode a string as space-separated 8-bit binary (for the matrix theme).
  function toBinary(str) {
    var out = "";
    for (var i = 0; i < str.length; i++) {
      var bits = str.charCodeAt(i).toString(2);
      while (bits.length < 8) bits = "0" + bits;
      out += (i ? " " : "") + bits;
    }
    return out;
  }

  function buildLine() {
    var g = pick(GENERATORS)();
    var text = ts() + "  " + g.html;
    var span = document.createElement("span");
    span.className = "line" + (g.cls ? " " + g.cls : "");
    span.textContent = theme === "matrix" ? toBinary(text) : text;
    return span;
  }

  // blinking cursor that always sits at the bottom
  var cursorLine = document.createElement("span");
  cursorLine.className = "line";
  cursorLine.innerHTML = '<span class="dim">root@localhost:~# </span><span id="cursor"></span>';

  // ----- main loop ---------------------------------------------------------
  function emit() {
    feed.insertBefore(buildLine(), cursorLine);
    while (feed.childNodes.length - 1 > MAX_LINES) {
      feed.removeChild(feed.firstChild);
    }
    feed.scrollTop = feed.scrollHeight;
  }

  function currentDelay() {
    // speed 1..20 maps to multiplier 0.1x .. 2.0x
    var mult = speedInput.value / 10;
    return BASE_DELAY / mult;
  }

  function schedule() {
    clearTimeout(timer);
    if (paused) return;
    // small jitter so the cadence feels organic
    var jitter = 0.6 + Math.random() * 0.8;
    timer = setTimeout(function () {
      emit();
      schedule();
    }, currentDelay() * jitter);
  }

  // ----- controls ----------------------------------------------------------
  function setPaused(p) {
    paused = p;
    toggleBtn.textContent = paused ? "▶ Resume" : "⏸ Pause";
    statusEl.textContent = paused ? "paused" : "streaming";
    if (!paused) schedule();
    else clearTimeout(timer);
  }

  toggleBtn.addEventListener("click", function () { setPaused(!paused); });

  speedInput.addEventListener("input", function () {
    speedVal.textContent = (speedInput.value / 10).toFixed(1) + "x";
    if (!paused) schedule();
  });

  fsBtn.addEventListener("click", function () {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(function () {});
    } else {
      document.exitFullscreen();
    }
  });

  // theme switch: classic green text vs. matrix 0s/1s
  function setTheme(next) {
    theme = next;
    document.body.classList.toggle("theme-matrix", next === "matrix");
    themeClassicBtn.classList.toggle("theme-active", next === "classic");
    themeMatrixBtn.classList.toggle("theme-active", next === "matrix");
    // repaint the visible feed so the switch is immediate, not gradual
    var line = cursorLine.previousSibling;
    while (line) {
      var prev = line.previousSibling;
      feed.removeChild(line);
      line = prev;
    }
    for (var i = 0; i < 12; i++) emit();
  }
  themeClassicBtn.addEventListener("click", function () { setTheme("classic"); });
  themeMatrixBtn.addEventListener("click", function () { setTheme("matrix"); });

  // settings panel open/close (gear button)
  function setSettingsOpen(open) {
    document.body.classList.toggle("settings-open", open);
    gearBtn.setAttribute("aria-expanded", open ? "true" : "false");
    controls.setAttribute("aria-hidden", open ? "false" : "true");
    if (open) poke();
  }
  gearBtn.addEventListener("click", function () {
    setSettingsOpen(!document.body.classList.contains("settings-open"));
  });
  // tap outside the panel/gear closes it
  document.addEventListener("click", function (e) {
    if (!document.body.classList.contains("settings-open")) return;
    if (!controls.contains(e.target) && e.target !== gearBtn) setSettingsOpen(false);
  });

  document.addEventListener("keydown", function (e) {
    if (e.code === "Space") { e.preventDefault(); setPaused(!paused); }
    else if (e.key === "f" || e.key === "F") { fsBtn.click(); }
    else if (e.key === "Escape") { setSettingsOpen(false); }
    else if (e.key === "ArrowUp") { speedInput.value = Math.min(20, +speedInput.value + 1); speedInput.dispatchEvent(new Event("input")); }
    else if (e.key === "ArrowDown") { speedInput.value = Math.max(1, +speedInput.value - 1); speedInput.dispatchEvent(new Event("input")); }
  });

  // auto-hide the control bar when the mouse is idle (clean recordings)
  var idleTimer = null;
  function poke() {
    document.body.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function () { document.body.classList.add("idle"); }, 2500);
  }
  document.addEventListener("mousemove", poke);
  document.addEventListener("keydown", poke);
  document.addEventListener("touchstart", poke, { passive: true });

  // ----- boot --------------------------------------------------------------
  feed.appendChild(cursorLine);
  speedVal.textContent = (speedInput.value / 10).toFixed(1) + "x";
  // seed a few lines so it doesn't start empty
  for (var i = 0; i < 12; i++) emit();
  schedule();
  poke();
})();
</script>
</body>
</html>
