<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>File Transfer</title>
<!--
  Standalone fake retro file-transfer screen for screen-recording / demos.
  Open directly in a browser, or reach it from the app under
    Utility → Fake File Transfer.

  Sibling of hacker-terminal.html and fake-ide.html.

  Controls: tap the ⚙ gear (bottom-right) for the settings panel —
  pause/resume, speed, and fullscreen.
  Shortcuts: Space = pause/resume, f = fullscreen, ↑/↓ = speed, Esc = close.
-->
<style>
  :root {
    --green: #33ff66;
    --green-dim: #1c8a39;
    --amber: #ffcc33;
    --red: #ff4d4d;
    --cyan: #33ccff;
    --bg: #000500;
    --row-bg: rgba(0, 30, 10, 0.35);
    --row-done: rgba(0, 50, 15, 0.5);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  body {
    font-family: "Cascadia Code", "Fira Code", "Consolas", "Courier New", monospace;
    color: var(--green);
    display: flex;
    flex-direction: column;
    height: 100vh;
    text-shadow: 0 0 4px rgba(51, 255, 102, 0.55);
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 0, 0, 0.25) 3px,
      rgba(0, 0, 0, 0) 4px
    );
    z-index: 5;
  }

  #header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--green-dim);
    flex-shrink: 0;
  }

  #header .title {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  #header .meta {
    font-size: 13px;
    color: var(--green-dim);
    display: flex;
    flex-wrap: wrap;
    gap: 16px 24px;
  }

  #header .meta span { white-space: nowrap; }
  #header .meta .val { color: var(--green); }
  #header .meta .connected { color: var(--green); }
  #header .meta .connected::before {
    content: "● ";
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.4; } }

  #colhead {
    display: grid;
    grid-template-columns: 28px 1fr 72px 140px 72px 80px 60px;
    gap: 8px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--green-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px dashed var(--green-dim);
    flex-shrink: 0;
  }

  #queue {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 80px;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .xfer-row {
    display: grid;
    grid-template-columns: 28px 1fr 72px 140px 72px 80px 60px;
    gap: 8px;
    align-items: center;
    padding: 7px 8px;
    margin-bottom: 4px;
    font-size: 15px;
    line-height: 1.3;
    background: var(--row-bg);
    border-left: 2px solid var(--green-dim);
    border-radius: 2px;
    transition: background 0.3s, border-color 0.3s;
  }

  .xfer-row.upload { border-left-color: var(--amber); }
  .xfer-row.done {
    background: var(--row-done);
    border-left-color: var(--green);
    opacity: 0.85;
  }

  .dir { font-size: 15px; text-align: center; }
  .dir.down { color: var(--cyan); }
  .dir.up { color: var(--amber); }

  .fname {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .size { color: var(--green-dim); text-align: right; font-size: 14px; }

  .bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bar {
    flex: 1;
    height: 10px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--green-dim);
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(51, 255, 102, 0.6);
    transition: width 0.15s linear;
    min-width: 0;
  }

  .xfer-row.upload .bar-fill {
    background: var(--amber);
    box-shadow: 0 0 6px rgba(255, 204, 51, 0.5);
  }

  .xfer-row.done .bar-fill { background: var(--green); }

  .pct {
    font-size: 13px;
    color: var(--green-dim);
    min-width: 32px;
    text-align: right;
  }

  .speed { color: var(--green-dim); font-size: 14px; text-align: right; }
  .eta { color: var(--green-dim); font-size: 14px; text-align: right; }

  .status {
    text-align: center;
    font-size: 14px;
  }

  .status.active::after {
    content: "…";
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ""; }
    40% { content: "."; }
    60% { content: ".."; }
    80%, 100% { content: "..."; }
  }

  .status.done-icon { color: var(--green); font-weight: bold; }

  #footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 8px 20px;
    background: rgba(0, 10, 3, 0.92);
    border-top: 1px solid var(--green-dim);
    font-size: 14px;
    color: var(--green-dim);
    display: flex;
    justify-content: space-between;
    z-index: 4;
  }

  #footer .totals .val { color: var(--green); }

  #gearBtn {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 20;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(0, 20, 6, 0.85);
    color: var(--green);
    border: 1px solid var(--green-dim);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 10px rgba(51, 255, 102, 0.25);
    transition: opacity 0.4s ease, background 0.15s, transform 0.2s ease;
  }
  #gearBtn:hover { background: var(--green-dim); color: #000; }
  body.settings-open #gearBtn { transform: rotate(60deg); }
  body.idle:not(.settings-open) #gearBtn { opacity: 0.25; }

  #controls {
    position: fixed;
    right: 16px;
    bottom: 76px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 260px;
    max-width: calc(100vw - 32px);
    padding: 14px 16px;
    background: rgba(0, 20, 6, 0.95);
    border: 1px solid var(--green-dim);
    border-radius: 8px;
    box-shadow: 0 0 16px rgba(0, 0, 0, 0.6);
    font-size: 14px;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  body.settings-open #controls {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .controls-title {
    font-weight: bold;
    color: var(--green);
    border-bottom: 1px solid var(--green-dim);
    padding-bottom: 8px;
  }

  #controls button {
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green-dim);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
    flex: 1;
    transition: background 0.15s, color 0.15s;
  }
  #controls button:hover { background: var(--green-dim); color: #000; }
  #controls label { color: var(--green-dim); }
  #speedVal { color: var(--green); min-width: 38px; display: inline-block; text-align: right; }
  #controls input[type="range"] { accent-color: var(--green); cursor: pointer; flex: 1; min-width: 0; }
  #status { color: var(--green-dim); }

  @media (max-width: 720px) {
    #colhead { display: none; }
    .xfer-row {
      grid-template-columns: 28px 1fr auto;
      grid-template-rows: auto auto auto auto;
      grid-template-areas: 
        "dir fname status"
        "bar bar bar"
        ". size size"
        ". speed eta";
      gap: 6px;
      padding: 12px;
    }
    .dir { grid-area: dir; font-size: 16px; }
    .fname { grid-area: fname; font-size: 15px; white-space: normal; word-break: break-all; }
    .status { grid-area: status; text-align: right; }
    .size { grid-area: size; text-align: left; }
    .bar-wrap { grid-area: bar; margin: 4px 0; }
    .speed { grid-area: speed; text-align: left; }
    .eta { grid-area: eta; text-align: right; }
    
    .size::before { content: "Size: "; }
    .speed::before { content: "Speed: "; }
    .eta::before { content: "ETA: "; }
    
    #footer { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>
<body>
  <div id="header">
    <div class="title">scp — secure copy</div>
    <div class="meta">
      <span>host: <span class="val" id="hostVal">root@192.168.1.47</span></span>
      <span>protocol: <span class="val">SCP over SSH-2</span></span>
      <span>cipher: <span class="val">aes256-ctr</span></span>
      <span class="connected">connected</span>
    </div>
  </div>

  <div id="colhead" aria-hidden="true">
    <span></span>
    <span>file</span>
    <span>size</span>
    <span>progress</span>
    <span>speed</span>
    <span>eta</span>
    <span>status</span>
  </div>

  <div id="queue" aria-live="off"></div>

  <div id="footer">
    <span class="totals">
      active: <span class="val" id="activeCount">0</span>
      &nbsp;|&nbsp;
      completed: <span class="val" id="doneCount">0</span>
      &nbsp;|&nbsp;
      total xfer: <span class="val" id="totalBytes">0 B</span>
    </span>
    <span id="clockVal">--:--:--</span>
  </div>

  <button id="gearBtn" type="button" aria-label="Settings" aria-expanded="false" title="Settings">⚙</button>

  <div id="controls" role="dialog" aria-label="Transfer settings" aria-hidden="true">
    <div class="controls-row controls-title">Settings</div>
    <div class="controls-row">
      <button id="toggleBtn" type="button" title="Pause / resume (space)">⏸ Pause</button>
      <button id="fsBtn" type="button" title="Toggle fullscreen (f)">⛶ Fullscreen</button>
    </div>
    <div class="controls-row">
      <label for="speed">speed</label>
      <input id="speed" type="range" min="1" max="20" value="10" />
      <span id="speedVal">1.0x</span>
    </div>
    <div class="controls-row">
      <span id="status">transferring</span>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var queue = document.getElementById("queue");
  var toggleBtn = document.getElementById("toggleBtn");
  var speedInput = document.getElementById("speed");
  var speedVal = document.getElementById("speedVal");
  var statusEl = document.getElementById("status");
  var fsBtn = document.getElementById("fsBtn");
  var gearBtn = document.getElementById("gearBtn");
  var controls = document.getElementById("controls");
  var activeCountEl = document.getElementById("activeCount");
  var doneCountEl = document.getElementById("doneCount");
  var totalBytesEl = document.getElementById("totalBytes");
  var clockVal = document.getElementById("clockVal");

  var MAX_ACTIVE = 6;
  var BASE_TICK = 120;
  var paused = false;
  var timer = null;
  var transfers = [];
  var doneCount = 0;
  var totalBytes = 0;
  var nextId = 0;

  var HOSTS = [
    "root@192.168.1.47",
    "admin@10.0.0.12",
    "deploy@prod-web-03.internal",
    "backup@nas.local",
    "ops@172.16.4.88"
  ];

  var FILES = [
    "/opt/payload.bin",
    "/var/log/auth.log.1",
    "/home/user/.ssh/id_rsa",
    "/etc/shadow.bak",
    "/tmp/exfil_7f3a.tar.gz",
    "/usr/share/wordlists/rockyou.txt",
    "/var/www/html/config.php",
    "/root/.bash_history",
    "/mnt/backup/db_dump.sql",
    "/srv/data/customers.csv",
    "/proc/kcore",
    "/dev/sda1.img",
    "secrets.db",
    "wallet.dat",
    "credentials.json",
    "private_key.pem",
    "nmap_scan.xml",
    "packet_capture.pcap",
    "kernel_module.ko",
    "firmware.bin",
    "index.html.bak",
    "access.log",
    "shadow_copy.vhd",
    "memdump.raw"
  ];

  var DIRS = ["remote:/", "local:/", "/var/tmp/", "/home/user/", "remote:/opt/"];

  function rand(n) { return Math.floor(Math.random() * n); }
  function pick(arr) { return arr[rand(arr.length)]; }
  function randBetween(a, b) { return a + Math.random() * (b - a); }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + " MB";
    return (bytes / 1073741824).toFixed(2) + " GB";
  }

  function formatSpeed(kbps) {
    if (kbps >= 1024) return (kbps / 1024).toFixed(1) + " MB/s";
    return Math.round(kbps) + " KB/s";
  }

  function formatEta(seconds) {
    if (!isFinite(seconds) || seconds <= 0) return "0:00";
    var m = Math.floor(seconds / 60);
    var s = Math.floor(seconds % 60);
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function makeFileName() {
    var base = pick(FILES);
    var dir = pick(DIRS);
    if (Math.random() < 0.4) return dir + base.split("/").pop();
    return base;
  }

  function makeTransfer(startPct) {
    var sizeBytes = Math.floor(randBetween(50, 800)) * 1024;
    if (Math.random() < 0.15) sizeBytes = Math.floor(randBetween(2, 120)) * 1048576;
    var upload = Math.random() < 0.35;
    return {
      id: nextId++,
      name: makeFileName(),
      sizeBytes: sizeBytes,
      pct: startPct || 0,
      speedKbps: randBetween(32, 2048),
      upload: upload,
      done: false,
      doneHold: 0,
      el: null
    };
  }

  function buildRowEl(t) {
    var row = document.createElement("div");
    row.className = "xfer-row" + (t.upload ? " upload" : "");
    row.dataset.id = t.id;

    var dir = document.createElement("span");
    dir.className = "dir " + (t.upload ? "up" : "down");
    dir.textContent = t.upload ? "↑" : "↓";

    var fname = document.createElement("span");
    fname.className = "fname";
    fname.textContent = t.name;
    fname.title = t.name;

    var size = document.createElement("span");
    size.className = "size";
    size.textContent = formatSize(t.sizeBytes);

    var barWrap = document.createElement("div");
    barWrap.className = "bar-wrap";
    var bar = document.createElement("div");
    bar.className = "bar";
    var barFill = document.createElement("div");
    barFill.className = "bar-fill";
    barFill.style.width = t.pct + "%";
    bar.appendChild(barFill);
    var pct = document.createElement("span");
    pct.className = "pct";
    pct.textContent = Math.floor(t.pct) + "%";
    barWrap.appendChild(bar);
    barWrap.appendChild(pct);

    var speed = document.createElement("span");
    speed.className = "speed";
    speed.textContent = formatSpeed(t.speedKbps);

    var eta = document.createElement("span");
    eta.className = "eta";
    var remaining = t.sizeBytes * (1 - t.pct / 100);
    eta.textContent = formatEta(remaining / (t.speedKbps * 1024));

    var status = document.createElement("span");
    status.className = "status active";

    row.appendChild(dir);
    row.appendChild(fname);
    row.appendChild(size);
    row.appendChild(barWrap);
    row.appendChild(speed);
    row.appendChild(eta);
    row.appendChild(status);

    t.el = row;
    t.refs = { barFill: barFill, pct: pct, speed: speed, eta: eta, status: status };
    return row;
  }

  function updateRow(t) {
    if (!t.el || !t.refs) return;
    t.refs.barFill.style.width = t.pct + "%";
    t.refs.pct.textContent = Math.floor(t.pct) + "%";
    t.refs.speed.textContent = formatSpeed(t.speedKbps);
    var remaining = t.sizeBytes * (1 - t.pct / 100);
    t.refs.eta.textContent = t.done ? "done" : formatEta(remaining / (t.speedKbps * 1024));

    if (t.done) {
      t.el.classList.add("done");
      t.refs.status.className = "status done-icon";
      t.refs.status.textContent = "✓";
    }
  }

  function addTransfer(startPct) {
    var t = makeTransfer(startPct);
    transfers.push(t);
    queue.appendChild(buildRowEl(t));
    updateRow(t);
    updateFooter();
    return t;
  }

  function removeTransfer(id) {
    for (var i = 0; i < transfers.length; i++) {
      if (transfers[i].id === id) {
        if (transfers[i].el) transfers[i].el.remove();
        transfers.splice(i, 1);
        break;
      }
    }
    updateFooter();
  }

  function activeCount() {
    var n = 0;
    for (var i = 0; i < transfers.length; i++) {
      if (!transfers[i].done) n++;
    }
    return n;
  }

  function updateFooter() {
    activeCountEl.textContent = activeCount();
    doneCountEl.textContent = doneCount;
    totalBytesEl.textContent = formatSize(totalBytes);
  }

  function tickTransfer(t, mult) {
    if (t.done) {
      t.doneHold += 1;
      return t.doneHold > 8;
    }

    t.speedKbps += randBetween(-80, 80) * mult;
    t.speedKbps = Math.max(24, Math.min(4096, t.speedKbps));

    var increment = randBetween(0.4, 2.8) * mult;
    if (Math.random() < 0.08) increment *= 0.2;
    if (Math.random() < 0.05) increment *= 2.5;

    t.pct += increment;
    if (t.pct >= 100) {
      t.pct = 100;
      t.done = true;
      doneCount++;
      totalBytes += t.sizeBytes;
    }
    updateRow(t);
    return false;
  }

  function tick() {
    var mult = speedInput.value / 10;
    var toRemove = [];

    for (var i = 0; i < transfers.length; i++) {
      if (tickTransfer(transfers[i], mult)) {
        toRemove.push(transfers[i].id);
      }
    }

    for (var j = 0; j < toRemove.length; j++) {
      removeTransfer(toRemove[j]);
    }

    while (activeCount() < MAX_ACTIVE) {
      addTransfer(randBetween(0, 45));
    }

    updateFooter();
  }

  function currentDelay() {
    var mult = speedInput.value / 10;
    return BASE_TICK / mult;
  }

  function schedule() {
    clearTimeout(timer);
    if (paused) return;
    var jitter = 0.7 + Math.random() * 0.6;
    timer = setTimeout(function () {
      tick();
      schedule();
    }, currentDelay() * jitter);
  }

  function setPaused(p) {
    paused = p;
    toggleBtn.textContent = paused ? "▶ Resume" : "⏸ Pause";
    statusEl.textContent = paused ? "paused" : "transferring";
    if (!paused) schedule();
    else clearTimeout(timer);
  }

  toggleBtn.addEventListener("click", function () { setPaused(!paused); });

  speedInput.addEventListener("input", function () {
    speedVal.textContent = (speedInput.value / 10).toFixed(1) + "x";
    if (!paused) schedule();
  });

  fsBtn.addEventListener("click", function () {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(function () {});
    } else {
      document.exitFullscreen();
    }
  });

  function setSettingsOpen(open) {
    document.body.classList.toggle("settings-open", open);
    gearBtn.setAttribute("aria-expanded", open ? "true" : "false");
    controls.setAttribute("aria-hidden", open ? "false" : "true");
    if (open) poke();
  }
  gearBtn.addEventListener("click", function () {
    setSettingsOpen(!document.body.classList.contains("settings-open"));
  });
  document.addEventListener("click", function (e) {
    if (!document.body.classList.contains("settings-open")) return;
    if (!controls.contains(e.target) && e.target !== gearBtn) setSettingsOpen(false);
  });

  document.addEventListener("keydown", function (e) {
    if (e.code === "Space") { e.preventDefault(); setPaused(!paused); }
    else if (e.key === "f" || e.key === "F") { fsBtn.click(); }
    else if (e.key === "Escape") { setSettingsOpen(false); }
    else if (e.key === "ArrowUp") { speedInput.value = Math.min(20, +speedInput.value + 1); speedInput.dispatchEvent(new Event("input")); }
    else if (e.key === "ArrowDown") { speedInput.value = Math.max(1, +speedInput.value - 1); speedInput.dispatchEvent(new Event("input")); }
  });

  var idleTimer = null;
  function poke() {
    document.body.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function () { document.body.classList.add("idle"); }, 2500);
  }
  document.addEventListener("mousemove", poke);
  document.addEventListener("keydown", poke);
  document.addEventListener("touchstart", poke, { passive: true });

  function updateClock() {
    var d = new Date();
    clockVal.textContent = pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
  }
  function pad2(n) { return n < 10 ? "0" + n : String(n); }
  setInterval(updateClock, 1000);
  updateClock();

  document.getElementById("hostVal").textContent = pick(HOSTS);

  speedVal.textContent = (speedInput.value / 10).toFixed(1) + "x";
  for (var i = 0; i < MAX_ACTIVE; i++) {
    addTransfer(randBetween(5, 70));
  }
  schedule();
  poke();
})();
</script>
</body>
</html>
