name: Build and Deploy

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Ghost-race relay on Render (PLAT-27, issue #44). Baked into
          # the client at build time so the deployed site's multiplayer
          # connects to the production relay.
          VITE_MULTIPLAYER_URL: https://vite-project-yazf.onrender.com

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry deployment after transient Pages failure
        id: retry_deployment
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Fail if deployment still failed
        if: steps.deployment.outcome == 'failure' || steps.retry_deployment.outcome == 'failure'
        run: exit 1
